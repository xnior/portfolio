<div [@fadeIn] class="container">
  
    <h2>Experiências</h2>
    @for (item of experiencesArrayOb$() | async; track item) {
    <details>
      <summary>
        <p>
          <strong>{{ item.summary.strong }}</strong
          >{{ item.summary.p }}
        </p>
      </summary>
      <article [innerHTML]="item.summary.description"></article>
    </details>
    }
</div>
